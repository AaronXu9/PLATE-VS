# Dual-Encoder Binding Affinity Model Configuration
# ESM2 + TorchMD-NET ET with Cross-Attention Fusion

data:
  dataset_dir: "../../../data/pdbbind_cleansplit/binding_affinity_dataset"
  labels_path: "../../../data/pdbbind_cleansplit/labels/PDBbind_data_dict.json"
  split_path: "../../../data/pdbbind_cleansplit/labels/PDBbind_data_split_cleansplit.json"
  clusters_path: "../../../data/pdbbind_cleansplit/labels/clusters_casf2016.json"
  batch_size: 16
  num_workers: 4
  max_pocket_residues: 80
  max_ligand_atoms: 100

model:
  esm_dim: 1088              # ANKH(320) + ESM2-t6(768)
  proj_dim: 256              # shared embedding dimension
  et_layers: 6               # TorchMD-NET ET depth
  et_heads: 8
  et_rbf: 64
  et_cutoff: 5.0             # Angstroms
  cross_attn_layers: 3
  cross_attn_heads: 8
  dropout: 0.1

loss:
  lambda_rank: 0.05           # reduced from 0.1 — ranking loss can cause gradient spikes
  huber_delta: 1.0
  rank_margin: 0.5
  rank_sample_size: 64

training:
  lr: 1.0e-4                  # reduced from 3e-4 — prevents overshoot after warmup
  weight_decay: 1.0e-5
  warmup_steps: 2000          # ~3 epochs warmup (was 500 = ~0.8 epochs)
  max_epochs: 100
  patience: 20                # more patience to ride out small dips
  grad_clip: 0.5              # tighter clipping (was 1.0)
  seed: 42

cv:
  n_folds: 5
  fold: 0

wandb:
  enabled: true
  project: "binding-affinity-pdbbind"
  entity: null
  tags: ["cleansplit", "dual-encoder", "et-crossattn"]

output:
  results_dir: "./results"
  checkpoint_dir: "./checkpoints"
