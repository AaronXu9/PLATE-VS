model_type: "gradient_boosting"
task: "regression"
backend: "auto"

hyperparameters:
  n_estimators: 300
  learning_rate: 0.05
  max_depth: null
  max_leaf_nodes: 63
  min_samples_leaf: 20
  subsample: 0.8
  colsample_bytree: 0.8
  l2_regularization: 0.1
  random_state: 42
  n_jobs: -1

features:
  type: "combined"
  ligand:
    type: "morgan_fingerprint"
    radius: 2
    n_bits: 2048
    use_features: false
  protein:
    type: "protein_identifier"
    embedding_dim: 32
    use_onehot: false
  concatenation_method: "concat"

data:
  similarity_threshold: "0p7"
  include_decoys: false
  include_protein_features: true
  task: "regression"
  use_2d_split: true

metrics:
  - rmse
  - mae
  - r2
  - pearson
  - spearman
  - ci
