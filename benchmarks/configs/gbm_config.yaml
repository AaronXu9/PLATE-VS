# Configuration for Gradient Boosting Model
# Backend: 'auto' | 'hist' (sklearn) | 'xgboost' | 'lightgbm'
# Default 'auto' picks XGBoost > LightGBM > HistGBM based on what's installed.

model_type: "gradient_boosting"
backend: "auto"

hyperparameters:
  n_estimators: 300
  learning_rate: 0.05
  max_depth: null          # null = no limit (hist backend); 6 for xgboost
  max_leaf_nodes: 63       # ~log2(63)=6 levels, hist backend only
  min_samples_leaf: 20     # hist backend only
  subsample: 0.8
  colsample_bytree: 0.8    # xgboost/lightgbm only
  l2_regularization: 0.1
  class_weight: "balanced"
  random_state: 42
  n_jobs: -1
  early_stopping_rounds: 30  # xgboost/lightgbm only

features:
  type: "combined"
  ligand:
    type: "morgan_fingerprint"
    radius: 2
    n_bits: 2048
    use_features: false
  protein:
    type: "protein_identifier"
    embedding_dim: 32
    use_onehot: false
  concatenation_method: "concat"

data:
  similarity_threshold: "0p7"
  include_decoys: true
  include_protein_features: true
  val_split: 0.2
  test_split: 0.0

cross_validation: false
cv_folds: 5

metrics:
  - accuracy
  - precision
  - recall
  - f1_score
  - roc_auc
  - avg_precision
  - mcc
