model_type: "random_forest"
task: "regression"
backend: ~

hyperparameters:
  n_estimators: 100
  max_depth: null
  min_samples_split: 2
  min_samples_leaf: 1
  max_features: "sqrt"
  bootstrap: true
  random_state: 42
  n_jobs: -1

features:
  type: "combined"
  ligand:
    type: "morgan_fingerprint"
    radius: 2
    n_bits: 2048
    use_features: false
  protein:
    type: "protein_identifier"
    embedding_dim: 32
    use_onehot: false
  concatenation_method: "concat"

data:
  similarity_threshold: "0p7"
  include_decoys: false
  include_protein_features: true
  task: "regression"
  use_2d_split: true

metrics:
  - rmse
  - mae
  - r2
  - pearson
  - spearman
  - ci
